<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <style>
        :root {

            --bg-color: #F0F4F8;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #222;
        }

        #game-container {
            width: 92%;
            max-width: 700px;
            background: white;
            border: 6px solid #333;
            border-radius: 35px;
            padding: 30px;
            box-shadow: 12px 12px 0px #444;
            text-align: center;

        h1 { font-size: 2.2rem; font-weight: 900; margin-bottom: 20px; }
        .page { display: none; }
        .active { display: block; animation: zoomIn 0.3s ease; }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .status-bar {
            background: #222;
            color: #FFD700;
            border-radius: 50px;
            padding: 15px;
            margin-bottom: 25px;
            font-size: 1.5rem;
            font-weight: 900;
        }

        .phase-indicator {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 10px;
            background: #EEE;
            font-size: 1rem;
            margin-bottom: 10px;
            border: 2px solid #333;
            font-weight: bold;
        }

        .btn-main {
            background-color: var(--primary-color);
            border: 5px solid #222;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 6px 0 #666;
            margin-top: 20px;
        }
        .btn-main:active { transform: translateY(4px); box-shadow: 0 2px 0 #666; }

        .choice-list { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .choice-btn {
            background: #fff;
            border: 4px solid #333;
            padding: 20px;
            border-radius: 20px;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
        }
        .choice-btn:hover { background: #FFF9C4; border-color: var(--info-color); }
        .choice-title { font-size: 1.4rem; font-weight: 900; display: block; }
        
        .result-item {
            background: #E3F2FD;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            text-align: left;
            border-left: 8px solid var(--info-color);
        }
        .wrong-choice { border-left-color: var(--danger-color); background: #FFEBEE; }
        
        .info-box {
            background: #F9F9F9;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #DDD;
            text-align: left;
            line-height: 1.6;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 0.8rem;
            background: #333;
            color: white;
            margin-bottom: 5px;

        { title: "網路寬頻與有線電視", desc: "頻寬有限，優先保障哪種訊號？", choices: [{ text: "保障網際網路", impact: "年輕人能獲取資訊，但長輩失去新聞來源。", cost: 15 }, { text: "保障電視訊號", impact: "長輩能看官方公告，但數位通訊癱瘓。", cost: 15 }] },
        { title: "私人醫生與公立診所", desc: "緊急醫材短缺，優先配發給誰？", choices: [{ text: "優先公立醫院", impact: "多數民眾受益，但私人診所病患遭遺棄。", cost: 25 }, { text: "全面平均配發", impact: "表面公平，但大型重症中心將物資不足。", cost: 25 }] },
        { title: "排水溝清理與樹木修剪", desc: "防颱人力有限，選哪項？", choices: [{ text: "清理排水溝", impact: "減少淹水機率，但倒樹砸人風險增加。", cost: 20 }, { text: "修剪路樹", impact: "保護行人安全，但豪雨來襲必定淹水。", cost: 20 }] },
        { title: "緊急稅收與緩課稅", desc: "災後財政短缺，你會？", choices: [{ text: "徵收特別救災捐", impact: "有錢重建，但民眾負擔過重引發民怨。", cost: 20 }, { text: "宣佈全面減稅", impact: "民眾生活好過，但政府將面臨破產。", cost: 20 }] },
        { title: "大型避難所與小型分散", desc: "收容策略？", choices: [{ text: "集中管理", impact: "物資配發容易，但易發生傳染病傳播。", cost: 20 }, { text: "分散社區", impact: "生活隱私較好，但物資配送困難且慢。", cost: 20 }] },
        { title: "災後心理諮商與建物檢查", desc: "有限預算下，優先執行哪項？", choices: [{ text: "心理諮商服務", impact: "災民心靈安穩，但仍住在結構不明的屋裡。", cost: 20 }, { text: "建物結構檢查", impact: "確認居住安全，但災民集體創傷未解。", cost: 20 }] }
    ];

    // 初始化與執行邏輯
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function startGame() {
        energy = 100;
        history = [];
        currentStepInFullGame = 0;
        currentPhase = 1;
        // 隨機抽取 2 題
        selectedP1 = [...phase1Data].sort(() => 0.5 - Math.random()).slice(0, 2);
        selectedP2 = [...phase2Data].sort(() => 0.5 - Math.random()).slice(0, 2);
        showPage('game-page');
        renderStep();
    }

    function renderStep() {
        let data;
        if (currentPhase === 1) {
            if (currentStepInFullGame >= selectedP1.length) {
                showPage('bridge-page');
                return;
            }
            data = selectedP1[currentStepInFullGame];
            document.getElementById('phase-tag').innerText = "階段一：守護生命底線 (SOP)";
        } else {
            let p2Index = currentStepInFullGame - selectedP1.length;
            if (p2Index >= selectedP2.length) {
                showResults();
                return;
            }
            data = selectedP2[p2Index];
            document.getElementById('phase-tag').innerText = "階段二：資源分配與「犧牲」 (Trade-off)";
        }

        document.getElementById('step-title').innerText = `🚨 ${data.title}`;
        document.getElementById('step-desc').innerText = data.desc;
        document.getElementById('energy-val').innerText = Math.max(0, energy);
        
        const container = document.getElementById('choice-container');
        container.innerHTML = '';
        
        data.choices.forEach((c, idx) => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerHTML = `<span class="choice-title">${c.text}</span>`;
            btn.onclick = () => {
                let status = currentPhase === 1 ? (c.correct ? "correct" : "wrong") : "dilemma";
                energy -= c.cost;
                history.push({ 
                    title: data.title, 
                    choice: c.text, 
                    impact: c.impact, 
                    status: status, 
                    phase: currentPhase,
                    choiceIdx: idx 
                });
                currentStepInFullGame++;
                renderStep();
            };
            container.appendChild(btn);
        });
    }

    function startPhase2() {
        currentPhase = 2;
        showPage('game-page');
        renderStep();
    }

    function showResults() {
        showPage('result-page');
        const list = document.getElementById('feedback-list');
        const p1Errors = history.filter(h => h.status === 'wrong');
        
        let humanitarianScore = 0; 
        let systemScore = 0;       
        
        list.innerHTML = history.map(h => {
            let typeTag = "";
            if (h.phase === 1) {
                typeTag = h.status === 'correct' ? '<span class="tag">專業達標</span>' : '<span class="tag" style="background:var(--danger-color)">安全失誤</span>';
            } else {
                typeTag = '<span class="tag" style="background:var(--info-color)">道德抉擇</span>';
                const keywords = ["居民", "老人", "幼童", "傷患", "藥品", "飲水", "住宅", "避難", "民生", "補助", "安養", "心理"];
                if (keywords.some(k => h.choice.includes(k))) humanitarianScore++;
                else systemScore++;
            }

            return `
                <div class="result-item ${h.status === 'wrong' ? 'wrong-choice' : ''}">
                    ${typeTag} <strong>${h.title}</strong><br>
                    您決定：${h.choice}<br>
                    <small>🔍 影響：${h.impact}</small>
                </div>
            `;
        }).join('');

        const evalBox = document.getElementById('final-evaluation');
        let title = "";
        let feedback = "";
        let styleDesc = "";

        if (humanitarianScore > systemScore) {
            styleDesc = "是一位「<b>守護弱勢、以人為本</b>」的市長。您在分配資源時，傾向優先保障市民的生存體感與社會公義。";
        } else if (systemScore > humanitarianScore) {
            styleDesc = "是一位「<b>大局為重、效能至上</b>」的市長。您在危機中傾向保住城市的基礎運作功能，確保長期復原力。";
        } else {
            styleDesc = "是一位「<b>極度理智、尋求平衡</b>」的市長。您在感性與理性間試圖保持對等，不讓某一側過度失衡。";
        }

        if (p1Errors.length === 0) {
            title = "🏆 卓越的領航者";
            feedback = `<p><b>市長，您的專業素養極高！</b> 您在第一階段的 SOP 決策全數正確，這確保了災難不會因人為失誤而擴大。</p>
                        <p>在第二階段中，您展現出${styleDesc}</p>
                        <p>在必須「犧牲」時，您展現了令人印象深刻的果斷。這座城市有您掌舵是幸運的。</p>`;
        } else if (p1Errors.length === 1) {
            title = "⚖️ 謹慎的挑戰者";
            const errorTitle = p1Errors[0].title;
            feedback = `<p><b>整體表現穩健，但細節仍有漏洞。</b> 您在「${errorTitle}」的決策中出現了專業疏失，這可能在現實中導致不可控的災情。</p>
                        <p>決策風格分析：您${styleDesc}</p>
                        <p>請記住：任何「權衡」若沒有正確的「SOP」支撐，都將會是空中樓閣。加油！</p>`;
        } else {
            title = "⚠️ 危機邊緣的決策者";
            feedback = `<p><b>警報！您的專業知識仍需大幅補強。</b> 在第一階段出現多次關鍵失誤，這代表基礎防線已經崩潰。</p>
                        <p>儘管您${styleDesc} 但在現實災難中，如果連基礎安全都顧不好，再感人或再有效率的抉擇都無法救活市民。</p>
                        <p>建議重新閱讀防災準則，再次演練。</p>`;
        }

        evalBox.innerHTML = `
            <h3 style="margin-top:0; color: #333;">${title}</h3>
            <div style="font-size: 1.1rem; color: #444;">${feedback}</div>
            <p style="margin-top: 15px; font-weight: 900; color: var(--danger-color); text-align:center;">最終電力餘裕：${Math.max(0, energy)} %</p>
        `;
    }
</script>
</body>
</html>
